---
- name: Install Clickhouse
  hosts: clickhouse
  become: true

  handlers:
    - name: Start clickhouse service
      become: true
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted
  tasks:

    - name: Get clickhouse distrib
      ansible.builtin.get_url:
        url: "https://packages.clickhouse.com/rpm/stable/{{ item }}-{{ clickhouse_version }}.noarch.rpm"
        dest: "./{{ item }}-{{ clickhouse_version }}.rpm"
        mode: "0755"
      with_items: "{{ clickhouse_packages }}"

    - name: Get clickhouse distrib
      ansible.builtin.get_url:
        url: "https://packages.clickhouse.com/rpm/stable/clickhouse-common-static-{{ clickhouse_version }}.x86_64.rpm"
        dest: "./clickhouse-common-static-{{ clickhouse_version }}.rpm"
        mode: "0755"

    - name: Install clickhouse packages
      become: true
      ansible.builtin.yum:
        name:
          - clickhouse-common-static-{{ clickhouse_version }}.rpm
          - clickhouse-client-{{ clickhouse_version }}.rpm
          - clickhouse-server-{{ clickhouse_version }}.rpm
      notify: Start clickhouse service

    - name: Flush handlers
      ansible.legacy.meta: flush_handlers

    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0

- name: Install and configure Vector
  hosts: vector
  become: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart vector
      ansible.builtin.service:
        name: vector
        state: restarted

  tasks:

    - name: Create vector install directory
      ansible.builtin.file:
        path: "{{ vector_install_dir }}"
        state: directory
        mode: "0755"
      check_mode: false
      tags: install

    - name: Create vector config directory
      ansible.builtin.file:
        path: "{{ vector_config_dir }}"
        state: directory
        mode: "0755"
      check_mode: false
      tags: install

    - name: Download vector archive
      ansible.builtin.get_url:
        url: "{{ vector_download_url }}"
        dest: "/tmp/{{ vector_archive }}"
        mode: "0644"
      tags: install

    - name: Extract vector archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ vector_archive }}"
        dest: "{{ vector_install_dir }}"
        remote_src: true
        creates: "{{ vector_install_dir }}/vector-{{ vector_version }}-x86_64-unknown-linux-gnu"
      tags: install

    - name: Create symlink to vector binary
      ansible.builtin.file:
        src: "{{ vector_install_dir }}/vector-x86_64-unknown-linux-gnu/bin/vector"
        dest: /usr/bin/vector
        state: link
        force: true
      tags: install

    - name: Deploy vector config
      ansible.builtin.template:
        src: vector.toml.j2
        dest: "{{ vector_config_dir }}/vector.toml"
        mode: "0644"
      notify: Restart vector
      tags: config

    - name: Create systemd service file
      ansible.builtin.copy:
        dest: /etc/systemd/system/vector.service
        mode: "0644"
        content: |
         [Unit]
         Description=Vector Service
         After=network.target

         [Service]
         Type=simple
         ExecStart=/usr/bin/vector --config {{ vector_config_dir }}/vector.toml
         Restart=always
         RestartSec=5s

         [Install]
         WantedBy=multi-user.target
      notify:
        - Reload systemd
        - Restart vector
      tags: service

    - name: Enable and start vector
      ansible.builtin.service:
        name: vector
        enabled: true
        state: started
