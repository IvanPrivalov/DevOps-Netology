---
- name: Install Clickhouse
  hosts: clickhouse
  become: true

  handlers:
    - name: Restart clickhouse
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted
      when: not ansible_check_mode

  tasks:

    - name: Install repo dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - gnupg
        state: present
        update_cache: true

    - name: Add ClickHouse repository
      ansible.builtin.apt_repository:
        repo: "deb [trusted=yes] https://packages.clickhouse.com/deb stable main"
        filename: clickhouse
        state: present
      check_mode: false

    - name: Update apt cache after adding ClickHouse repo
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      check_mode: false

    - name: Install ClickHouse packages
      ansible.builtin.apt:
        name: "{{ clickhouse_packages }}"
        state: present
        update_cache: true
      notify: Restart clickhouse

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Create logs database
      ansible.builtin.command: clickhouse-client -q "create database logs;"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0

- name: Install and configure Vector
  hosts: vector
  become: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart vector
      ansible.builtin.service:
        name: vector
        state: restarted

  tasks:

    - name: Create vector install directory
      ansible.builtin.file:
        path: "{{ vector_install_dir }}"
        state: directory
        mode: "0755"
      check_mode: false

    - name: Create vector config directory
      ansible.builtin.file:
        path: "{{ vector_config_dir }}"
        state: directory
        mode: "0755"
      check_mode: false

    - name: Download vector archive
      ansible.builtin.get_url:
        url: "{{ vector_download_url }}"
        dest: "/tmp/{{ vector_archive }}"
        mode: "0644"
      check_mode: false

    - name: Extract vector archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ vector_archive }}"
        dest: "{{ vector_install_dir }}"
        remote_src: true
        creates: "{{ vector_install_dir }}/vector-{{ vector_version }}-x86_64-unknown-linux-gnu"
      check_mode: false

    - name: Create symlink to vector binary
      ansible.builtin.file:
        src: "{{ vector_install_dir }}/vector-x86_64-unknown-linux-gnu/bin/vector"
        dest: /usr/bin/vector
        state: link
        force: true

    - name: Deploy vector config
      ansible.builtin.template:
        src: vector.toml.j2
        dest: "{{ vector_config_dir }}/vector.toml"
        mode: "0644"
      notify: Restart vector

    - name: Create systemd service file
      ansible.builtin.copy:
        dest: /etc/systemd/system/vector.service
        mode: "0644"
        content: |
         [Unit]
         Description=Vector Service
         After=network.target

         [Service]
         Type=simple
         ExecStart=/usr/bin/vector --config {{ vector_config_dir }}/vector.toml
         Restart=always
         RestartSec=5s

         [Install]
         WantedBy=multi-user.target
      notify:
        - Reload systemd
        - Restart vector
      check_mode: false

    - name: Enable and start vector
      ansible.builtin.service:
        name: vector
        enabled: true
        state: started
      when: not ansible_check_mode

- name: Install and configure LightHouse
  hosts: lighthouse
  become: true

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
      when: not ansible_check_mode

  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Create LightHouse install directory
      ansible.builtin.file:
        path: "{{ lighthouse_install_dir }}"
        state: directory
        mode: "0755"
      check_mode: false

    - name: Download LightHouse archive
      ansible.builtin.get_url:
        url: "{{ lighthouse_download_url }}"
        dest: "/tmp/{{ lighthouse_archive }}"
        mode: "0644"
      check_mode: false

    - name: Extract LightHouse archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ lighthouse_archive }}"
        dest: "{{ lighthouse_install_dir }}"
        remote_src: true
        creates: "{{ lighthouse_install_dir }}/{{ lighthouse_archive_dir }}"
      check_mode: false

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Deploy nginx config for LightHouse
      ansible.builtin.template:
        src: lighthouse.conf.j2
        dest: /etc/nginx/conf.d/lighthouse.conf
        mode: "0644"
      notify: Restart nginx

    - name: Enable and start nginx
      ansible.builtin.service:
        name: nginx
        enabled: true
        state: started
      when: not ansible_check_mode
